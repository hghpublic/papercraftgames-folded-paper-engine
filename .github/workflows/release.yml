name: Release (build zips + update version)

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 18 }

      - name: Export VERSION from tag
        run: |
          V="${{ github.event.release.tag_name }}"
          V="${V#v}"
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "Using VERSION=$V"

      - name: Install deps
        run: yarn

      # Build only the add-on artifacts (no website)
      - name: Make dist
        run: mkdir -p dist
      - name: Build Blender add-on ZIP
        run: yarn deploy-blender-addon
      - name: Build Godot add-on ZIP
        run: yarn deploy-godot-addon
      - name: Build Blender Extension ZIP
        run: |
          EXT_DIR="dist/folded_paper_engine"
          mkdir -p "$EXT_DIR"

          # Copy the addon code (already built in dist)
          cp dist/folded_paper_engine.py "$EXT_DIR/"

          # Copy license + readme
          cp LICENSE.txt "$EXT_DIR/"
          cp README.md "$EXT_DIR/"

          # Create blender_manifest.toml dynamically using VERSION from env
          cat > "$EXT_DIR/blender_manifest.toml" <<EOF
          schema_version = "1.0.0"
          
          id = "folded_paper_engine"
          version = "${VERSION}"
          name = "Folded Paper Engine"
          tagline = "Define gameplay in Blender and play in Godot with a few clicks"
          maintainer = "Papercraft Games <contact@papercraft.games>"
          type = "add-on"
          
          license = ["SPDX:GPL-3.0-or-later", "SPDX:MIT"]
          website = "https://foldedpaperengine.com"
          
          blender_version_min = "4.4.0"
          tags = ["Import-Export", "Game Engine", "Pipeline"]
          EOF
          
          cat > "$EXT_DIR/__init__.py" <<EOF
          from .folded_paper_engine import bl_info as _bl_info
          from .folded_paper_engine import register as _inner_register, unregister as _inner_unregister
          
          bl_info = _bl_info
          
          def register():
            _inner_register()
          
          def unregister():
            _inner_unregister()
          EOF

          # Zip the extension
          cd dist
          zip -r folded_paper_engine_blender_extension.zip folded_paper_engine

      # Attach zips to the release
      - name: Upload ZIPs to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
